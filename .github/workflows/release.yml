name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;34.0.0 cmdline-tools;latest"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -x ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      # TODO: add KEYSTORE_BASE64 secret (plus KEYSTORE_PASSWORD, KEY_ALIAS,
      # KEY_PASSWORD) for proper release signing. Current build.gradle.kts
      # signs release with the debug keystore, so this still produces an APK
      # but it is NOT distribution-ready.
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

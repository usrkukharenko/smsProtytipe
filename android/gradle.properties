org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# --- Release signing (uncomment and fill in to sign release builds) ---
# Generate a keystore once with:
#   keytool -genkey -v -keystore release.keystore -alias smsvxod \
#           -keyalg RSA -keysize 2048 -validity 10000
# Either set these here (NOT in version control!) or export them as env vars
# with the same names before running `gradle assembleRelease`.
#
# RELEASE_STORE_FILE=/absolute/path/to/release.keystore
# RELEASE_STORE_PASSWORD=changeit
# RELEASE_KEY_ALIAS=smsvxod
# RELEASE_KEY_PASSWORD=changeit
